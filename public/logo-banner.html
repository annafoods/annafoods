<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1584px;
    height: 396px;
    background-color: #f2e9e0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 56px;
  }
  .logo {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 100px;
    font-weight: 700;
    color: #8B6334;
    letter-spacing: 3px;
    line-height: 1;
  }
  .divider {
    width: 1.5px;
    height: 160px;
    background-color: #A05432;
    opacity: 0.4;
    flex-shrink: 0;
  }
  .tagline {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .tagline span {
    font-family: 'DM Sans', system-ui, sans-serif;
    font-size: 19px;
    font-weight: 300;
    color: #5c4030;
    letter-spacing: 1.2px;
    opacity: 0.7;
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300&display=swap" rel="stylesheet">
</head>
<body>
  <div class="logo">Anna Foods</div>
  <div class="divider"></div>
  <div class="tagline">
    <span>Voedingswetenschapper</span>
    <span>Diëtist &amp; orthomoleculair therapeut</span>
    <span>Insider</span>
  </div>
</body>
</html>
